        <script>
            document.getElementById("asignaturas-container").addEventListener("click", function (e) {
                if (e.target.tagName === "BUTTON") {
                    const idBoton = e.target.id;
                    const sublist = document.getElementById(idBoton + "-sublist");

                    if (sublist) {
                        // Lógica de abrir/cerrar menú (se queda igual)
                        const sublistas = document.querySelectorAll('[id$="-sublist"]');
                        sublistas.forEach((sub) => {
                            if (sub.id !== idBoton + "-sublist") sub.style.display = "none";
                        });
                        sublist.style.display = sublist.style.display === "none" ? "block" : "none";
                    } else {
                        // REDIRECCIÓN A LA URL LIMPIA
                        window.location.href = `/${idBoton}`;
                    }
                }
            });
        </script>
        <script src="/resources/js/main.js"></script>
