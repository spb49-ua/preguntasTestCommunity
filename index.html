<!DOCTYPE html>
<html lang="es">
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta charset="UTF-8">
    <title>Preguntas y Respuestas • Community Edition</title>
    <link rel="stylesheet" href="styles.css">
    <link href="prism.css" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/KaTeX/0.13.0/katex.min.css" crossorigin="anonymous">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/KaTeX/0.13.0/katex.min.js" crossorigin="anonymous"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/KaTeX/0.13.0/contrib/auto-render.min.js" crossorigin="anonymous"></script>   
</head>
</head>
<body>
  <header>
    <a href="https://github.com/" class="github-link" target="_blank">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="24" height="24">
          <path d="M12 1.27a11 11 0 00-3.48 21.46c.55.09.73-.28.73-.55v-1.84c-3.03.64-3.67-1.46-3.67-1.46-.55-1.29-1.28-1.65-1.28-1.65-.92-.65.1-.65.1-.65 1.1 0 1.73 1.1 1.73 1.1.92 1.65 2.57 1.2 3.21.92a2 2 0 01.64-1.47c-2.47-.27-5.04-1.19-5.04-5.5 0-1.1.46-2.1 1.2-2.84a3.76 3.76 0 010-2.93s.91-.28 3.11 1.1c1.8-.49 3.7-.49 5.5 0 2.1-1.38 3.02-1.1 3.02-1.1a3.76 3.76 0 010 2.93c.83.74 1.2 1.74 1.2 2.94 0 4.21-2.57 5.13-5.04 5.4.45.37.82.92.82 2.02v3.03c0 .27.1.64.73.55A11 11 0 0012 1.27"></path>
        </svg>
      </a>
      
    <h2 id="asignatura-nombre">
      <span class="title-main">Preguntas y Respuestas</span>
      <span class="title-badge">Community Edition</span>
    </h2>
    <button id="theme-toggle" class="light-mode">&#9728;</button>
  </header>
  <div id="main-container">
    <div id="app">
      <button id="copyButton" class="copy-button" style="display: none;" aria-label="Copiar pregunta y respuestas">📋</button>
        <h1 id="app-title">Seleccione una asignatura</h1>
        <div id="asignaturas-container">
          <h3>Rama Software</h3>
          <div class="asignaturas">
            <!-- Grupo de Asignaturas Izquierdas -->
            <div class="group-left">
              <button id="dca">DCA</button>
              <!-- <button id="dca-NO-OFICIAL">DCA-NO-OFICIAL</button> -->
              <button id="MADS-NO-OFICIAL">MADS-NO-OFICIAL</button>
              <!-- <button id="MADS-NO-OFICIAL-P1">MADS-NO-OFICIAL-P1</button> -->
              <!-- <button id="MADS-NO-OFICIAL-P2">MADS-NO-OFICIAL-P2</button> -->
            </div>
            
            <!-- Separador Vertical -->
            <div class="separator"></div>
            
            <!-- Grupo de Asignaturas Derechas -->
            <div class="group-right">
              <button id="gcs">GCS</button>
              <!-- <button id="gcsp1nooficial">GCS-P1-NO-OFICIAL</button> -->
              <!-- <button id="gcsp1old">GCS-P1-old</button> -->
              <!-- <button id="gcsp2old">GCS-P2-old</button> -->
              <button id="sds-no-oficial">SDS-NO-OFICIAL</button>
            </div>
          </div>

          <!-- Sublista para MADS (inicialmente oculta) -->
          <div id="mads-sublist" style="display: none; margin-top: 10px;">
            <h4>Asignaturas MADS</h4>
            <div class="asignaturas listaoculta">
              <button id="MADS-NO-OFICIAL-P1">MADS-NO-OFICIAL-P1</button>
              <button id="MADS-NO-OFICIAL-P2">MADS-NO-OFICIAL-P2</button>
            </div>
          </div>

          <!-- Sublista para DCA (inicialmente oculta) -->
          <div id="dca-sublist" style="display: none; margin-top: 10px;">
            <h4>Asignaturas DCA</h4>
            <div class="asignaturas listaoculta">
              <button id="dca-oficial">DCA-OFICIAL</button>
              <button id="dca-NO-OFICIAL">DCA-NO-OFICIAL</button>
            </div>
          </div>

          <!-- Sublista para GCS (inicialmente oculta) -->
          <div id="gcs-sublist" style="display: none; margin-top: 10px;">
            <h4>Asignaturas GCS</h4>
            <div class="asignaturas listaoculta">
              <button id="gcsp1nooficial">GCS-P1-NO-OFICIAL-2025</button>
              <button id="gcsp1old">GCS-P1-old-2024</button>
              <button id="gcsp2old">GCS-P2-old-2024</button>
            </div>
          </div>
          
          <!-- Sublista para SDS-NO-OFICIAL (inicialmente oculta) -->
          <div id="sds-sublist" style="display: none; margin-top: 10px;">
            <h4>Asignaturas SDS</h4>
            <div class="asignaturas listaoculta">
              <button id="sdsfull">SDSFULL</button>
              <button id="sds01-presentacion">sds01-presentacion</button>
              <button id="sds02-introgo">sds02-introgo</button>
              <button id="sds03-introcripto">sds03-introcripto</button>
              <button id="sds04-aleatorios">sds04-aleatorios</button>
              <button id="sds05-flujo">sds05-flujo</button>
              <button id="sds06-bloque">sds06-bloque</button>
              <button id="sds07-hash">sds07-hash</button>
              <button id="sds08-publica">sds08-publica</button>
              <button id="sds09-transporte">sds09-transporte</button>
              <button id="sds10-ejercicios">sds10-ejercicios</button>
              <button id="sds11-malware">sds11-malware</button>
              <button id="sds12-ataques">sds12-ataques</button>
              <button id="sds13-wireless">sds13-wireless</button>
              <button id="sds14-recomendaciones">sds14-recomendaciones</button>
            </div>
          </div>

          <h3>Tercer Curso</h3>
          <div class="asignaturas">
            <div class="group-left">
              <button id="dss">DSS</button>
              <button id="gpi">GPI</button>
              <button id="ic-p1">IC-P1</button>
            </div>
            <div class="separator"></div>
            <div class="group-right">
              <button id="taes-definitivo">TAES-DEFINITIVO-OLD</button>
              <button id="ppss">PPSS</button>
              <!-- <button id="ppss-p1">PPSS-P1</button> -->
              <!-- <button id="ppss-p2">PPSS-P2</button> -->
            </div>
          </div>

          <!-- Sublista para PPSS(inicialmente oculta) -->
          <div id="ppss-sublist" style="display: none; margin-top: 10px;">
            <h4>Asignaturas PPSS</h4>
            <div class="asignaturas listaoculta">
              <button id="ppss-p1">PPSS-P1</button>
              <button id="ppss-p2">PPSS-P2</button>
            </div>
          </div>

          <h3>Segundo Curso</h3>
            <div class="asignaturas">
              <div class="group-left">
                <button id="redes">REDES</button>
              </div>
              <div class="separator"></div>
              <div class="group-right">
                <!-- <button id="ada-p2">ada-p2</button> -->
                <!-- <button id="ada-p1">ada-p1</button> -->
                <button id="ada">ADA</button>
                <!-- <button id="ada_descartadas">ADA_Descartadas</button> -->
                <button id="ped">PED</button>
                <button id="ac">AC</button>
                <!-- <button id="ac_CP-F2">ac_CP-F2</button> -->
                <!-- <button id="ac_CP-F3">ac_CP-F3</button> -->
                <!-- <button id="ac_CT3-4">ac_CT3-4</button> -->
                <!-- <button id="ac_CT1-2">ac_CT1-2</button> -->
                <button id="hada">HADA</button>
                <!-- <button id="redesEnero2324">redesEnero2324</button> -->
              </div>
            </div>

            <!-- Sublista para ADA(inicialmente oculta) -->
            <div id="ada-sublist" style="display: none; margin-top: 10px;">
              <h4>Asignaturas ADA</h4>
              <div class="asignaturas listaoculta">
                <button id="ada-p1">ada-p1</button>
                <button id="ada-p2">ada-p2</button>
                <button id="ada-full">ada-full</button>
              </div>
            </div>

            <!-- Sublista para AC (inicialmente oculta) -->
            <div id="ac-sublist" style="display: none; margin-top: 10px;">
              <h4>Asignaturas AC</h4>
              <div class="asignaturas listaoculta">
                <button id="ac_CP-F2">ac_CP-F2</button>
                <button id="ac_CP-F3">ac_CP-F3</button>
                <button id="ac_CT1-2">ac_CT1-2</button>
                <button id="ac_CT3-4">ac_CT3-4</button>
              </div>
            </div>

            <!-- Sublista para REDES (inicialmente oculta) -->
            <div id="redes-sublist" style="display: none; margin-top: 10px;">
              <h4>Asignaturas REDES</h4>
              <div class="asignaturas listaoculta">
                <button id="redes_full">redes_full</button>
                <button id="redesEnero2324">redesEnero2324</button></button>
                <button id="redesEnero2425">redesEnero2425</button></button>
                <button id="redesJulio2425">redesJulio2425</button>
                <button id="redesEnero2526">redesEnero2526</button></button>
              </div>
            </div>

          <h3>Primer Curso</h3>
            <div id="asignaturas">
                <button id="sti">STI</button>
            </div>
        </div>

        <div id="pregunta" style="text-align: left"></div>
        <form id="opciones"></form>
        <div id="resultado"></div>
        <button id="verificar" class="hidden">Verificar</button>
        <button id="volver" class="hidden">Volver</button>
    </div>
    <div id="button-container">
      <button id="resumenBtn" style="display: none;">Resumen</button>
    </div>
  </div>
    <script src="main.js"></script>
    <div class="contador hidden" id="contador">
      Correctas: 0 / Preguntas: 0
    </div>
    <div id="total-preguntas" class="bottom-left hidden"></div>
    <script src="prism.js"></script>
    <script>
      document.addEventListener("DOMContentLoaded", function() {
        renderMathInElement(document.body, {
          delimiters: [
            {left: "$$", right: "$$", display: false},  // LaTeX inline
            {left: "\\[", right: "\\]", display: true}  // LaTeX display mode
          ]
        });
      });
      </script>
    
    
</body>

</html>
